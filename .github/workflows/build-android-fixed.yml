name: Build Android APK (Fixed)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# Добавляем permissions для работы с форком
permissions:
  contents: read
  actions: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.0'
    
    - name: Create dummy google-services.json
      run: |
        mkdir -p android/app
        echo '{
          "project_info": {
            "project_number": "000000000000",
            "firebase_url": "https://dummy.firebaseio.com",
            "project_id": "dummy",
            "storage_bucket": "dummy.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": {
                  "package_name": "com.deepseek.app"
                }
              },
              "oauth_client": [
                {
                  "client_id": "dummy.apps.googleusercontent.com",
                  "client_type": 3
                }
              ],
              "api_key": [
                {
                  "current_key": "AIzaSyDummyKey"
                }
              ]
            }
          ]
        }' > android/google-services.json
        cat android/google-services.json
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > android/local.properties
    
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    
    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --stacktrace --no-daemon
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: deepseek-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Build Release APK (if requested)
      if: github.event.inputs.build_type == 'release'
      run: |
        cd android
        ./gradlew assembleRelease --stacktrace --no-daemon
    
    - name: Upload Release APK
      if: github.event.inputs.build_type == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: deepseek-release-apk
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30
