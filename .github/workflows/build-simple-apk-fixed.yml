name: Build Simple APK (Fixed)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Create simple Android project
      run: |
        mkdir -p simple-android/app/src/main/java/com/deepseek
        mkdir -p simple-android/app/src/main/res/layout
        mkdir -p simple-android/app/src/main/res/values
        
        # Create build.gradle
        cat > simple-android/build.gradle << 'EOF'
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF
        
        # Create app/build.gradle
        cat > simple-android/app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        android {
            namespace 'com.deepseek.simple'
            compileSdk 33
            defaultConfig {
                applicationId 'com.deepseek.simple'
                minSdk 24
                targetSdk 33
                versionCode 1
                versionName '1.0'
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF
        
        # Create AndroidManifest.xml
        cat > simple-android/app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="DeepSeek++" android:usesCleartextTraffic="true">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # Create MainActivity.java
        cat > simple-android/app/src/main/java/com/deepseek/MainActivity.java << 'EOF'
        package com.deepseek;
        import android.os.Bundle;
        import android.webkit.WebView;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.loadUrl("https://chat.deepseek.com");
                setContentView(webView);
            }
        }
        EOF
        
        # Create settings.gradle
        echo "include ':app'" > simple-android/settings.gradle
        
        # Create gradle wrapper
        cd simple-android
        gradle wrapper --gradle-version 7.5 --no-daemon
    
    - name: Grant execute permission
      run: chmod +x simple-android/gradlew
    
    - name: Clean npm cache and build APK
      run: |
        cd simple-android
        # Очищаем кэш gradle
        ./gradlew clean --no-daemon
        # Собираем APK
        ./gradlew assembleDebug --no-daemon --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: deepseek-simple-apk
        path: simple-android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
