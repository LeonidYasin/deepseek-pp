name: Build Simple APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Create Android project
      run: |
        # Create project structure
        mkdir -p app/src/main/java/com/deepseek/simple
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        
        # Create build.gradle
        cat > build.gradle << 'EOF'
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF
        
        # Create app/build.gradle
        cat > app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        android {
            namespace 'com.deepseek.simple'
            compileSdk 34
            defaultConfig {
                applicationId 'com.deepseek.simple'
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName '1.0'
            }
            buildTypes { debug { debuggable true } }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF
        
        # Create settings.gradle
        echo "include ':app'" > settings.gradle
        
        # Create AndroidManifest.xml
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="DeepSeek++" android:usesCleartextTraffic="true">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # Create MainActivity.java
        cat > app/src/main/java/com/deepseek/simple/MainActivity.java << 'EOF'
        package com.deepseek.simple;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import androidx.appcompat.app.AppCompatActivity;
        
        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.setWebViewClient(new WebViewClient());
                webView.loadUrl("https://chat.deepseek.com");
                setContentView(webView);
            }
        }
        EOF
        
        # Create gradle wrapper
        gradle wrapper --gradle-version 7.5 --distribution-type bin
    
    - name: Grant execute permission
      run: chmod +x gradlew
    
    - name: Build debug APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: deepseek-simple-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
