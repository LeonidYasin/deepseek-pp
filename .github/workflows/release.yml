name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release ref
        run: |
          if [[ ! ${{ github.ref }} =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-auto-[0-9]+)?$ ]]; then
            echo "Invalid release ref ${{ github.ref }}"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npx wxt build

      - name: Locate packages
        id: locate-packages
        run: |
          mkdir -p .output/packages
          cd .output
          zip -r packages/deepseek-pp-extension.zip ./* -x "packages/*"
          echo "ZIP generated at .output/packages/deepseek-pp-extension.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .output/packages/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
